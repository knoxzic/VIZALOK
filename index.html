<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIZALOK • Choose Your Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }

    .rock-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 50%, #0a0a0a 100%);
      position: relative;
      overflow: hidden;
    }
    
    .rock-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(148,163,184,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.06) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.6;
    }

    .logo-container {
      filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.9));
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen rock-bg">

  <div class="min-h-screen flex flex-col items-center justify-center px-6 py-12">
    
    <!-- Central Logo & Brand -->
    <div class="flex flex-col items-center text-center mb-20 logo-container">
      <img src="logo.png" alt="VIZALOK Logo" class="w-64 h-64 mb-8 object-contain">
      <h1 class="text-8xl font-black tracking-[-6px] text-white" 
          style="text-shadow: 0 15px 40px rgba(0,0,0,0.95), 0 0 50px rgb(165 243 252 / 0.4);">
        VIZALOK
      </h1>
      <p class="mt-8 text-2xl text-zinc-400 max-w-md text-center">
        From being inspired to inspiring
      </p>
    </div>

    <p class="text-zinc-400 text-2xl mb-16">Choose Your Platform</p>

    <!-- Three Cards -->
    <div class="grid md:grid-cols-3 gap-8 max-w-4xl w-full">
      
      <!-- Music Card -->
      <div onclick="window.location.href='music.html'" 
           class="bg-zinc-900/90 hover:bg-zinc-800 border border-zinc-700 hover:border-cyan-400 rounded-3xl p-10 text-center cursor-pointer transition-all">
        <div class="h-12 flex justify-center mb-6">
          <i class="fa-solid fa-music text-5xl text-cyan-400"></i>
        </div>
        <h3 class="text-4xl font-bold mb-2">Music</h3>
        <div class="text-cyan-400 text-2xl mb-8">♪</div>
        <p class="text-zinc-400 text-sm">Stream • Upload • Live • Royalties</p>
      </div>

      <!-- Creators Card -->
      <div onclick="alert('Creators Portal — Coming Soon')" 
           class="bg-zinc-900/90 hover:bg-zinc-800 border border-zinc-700 hover:border-purple-400 rounded-3xl p-10 text-center cursor-pointer transition-all">
        <div class="h-12 flex justify-center mb-6">
          <i class="fa-solid fa-palette text-5xl text-purple-400"></i>
        </div>
        <h3 class="text-4xl font-bold mb-2">Creators</h3>
        <div class="text-purple-400 text-2xl mb-8">✦</div>
        <p class="text-zinc-400 text-sm">Upload • Monetize • Analytics</p>
      </div>

      <!-- Community Card -->
      <div onclick="alert('Community Portal — Coming Soon\n\n• Top Creators feed\n• Discussions\n• Artist discovery\n• Live events')" 
           class="bg-zinc-900/90 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl p-10 text-center cursor-pointer transition-all">
        <div class="h-12 flex justify-center mb-6">
          <i class="fa-solid fa-users text-5xl text-emerald-400"></i>
        </div>
        <h3 class="text-4xl font-bold mb-2">Community</h3>
        <div class="text-emerald-400 text-2xl mb-8">👥</div>
        <p class="text-zinc-400 text-sm">Connect • Discover • Discuss</p>
      </div>

    </div>

    <div class="mt-20 text-zinc-500 text-sm">VIZALOK • Independent music & creator ecosystem</div>
  </div>

</body>
</html>
