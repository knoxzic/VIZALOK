      <div class="p-6 flex items-center gap-2">
        <div class="w-8 h-8 bg-blue-500 rounded-xl flex items-center justify-center text-xl font-bold">V</div>
        <span class="text-2xl font-bold tracking-tighter">VIZALOK</span>
        <span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full">XRP+</span>
      </div>
      <nav class="flex-1 px-3 space-y-1">
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl bg-zinc-800"><i class="fa-solid fa-house w-5"></i> Home/Discover</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800"><i class="fa-solid fa-cloud-arrow-up w-5"></i> Upload Song</a>

        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800"><i class="fa-solid fa-broadcast-tower w-5"></i> Live Streams</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800"><i class="fa-solid fa-coins w-5"></i> Royalties</a>
      </nav>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">
      <div class="h-14 bg-zinc-900 border-b border-zinc-800 flex items-center px-6 justify-between">
        <div class="flex-1 max-w-md"><input type="text" placeholder="Search songs, artists..." class="w-full bg-zinc-800 rounded-3xl px-5 py-2 text-sm"></div>
        <div class="flex items-center gap-4">
          <div id="profileSection" class="hidden items-center gap-3">
            <span id="username" class="font-medium">username</span>
            <button onclick="linkWallet()" class="bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-3xl text-sm">Link Wallet</button>
          </div>
          <button onclick="showSignup()" id="signupBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-3xl text-sm font-medium">Sign Up</button>
        </div>
      </div>

      <!-- BODY content same as before (featured player + leaderboard + right sidebar) - omitted for brevity, copy from previous message -->
      <!-- [paste the entire body from previous HTML here - featured player, leaderboard, right sidebar unchanged] -->
    </div>
  </div>

  <!-- SIGNUP MODAL -->
  <div id="signupModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-3xl w-96 p-8">
      <div class="text-xl font-semibold mb-6">Create Profile</div>
      <input id="signupName" type="text" placeholder="Username" class="w-full bg-zinc-800 rounded-2xl px-5 py-4 mb-3">
      <input id="signupEmail" type="email" placeholder="Email" class="w-full bg-zinc-800 rounded-2xl px-5 py-4 mb-6">
      <button onclick="completeSignup()" class="w-full bg-blue-600 py-4 rounded-3xl">Create Account</button>
    </div>
  </div>

  <script>
    function showSignup(){ document.getElementById('signupModal').classList.remove('hidden'); }
    function completeSignup(){
      const name = document.getElementById('signupName').value || 'user';
      document.getElementById('signupModal').classList.add('hidden');
      document.getElementById('signupBtn').classList.add('hidden');
      document.getElementById('profileSection').classList.remove('hidden');
      document.getElementById('username').textContent = name;
      alert('Profile created! Now link your wallet.');
    }
    function linkWallet(){ alert('Wallet linked (mock): rHb9CJAWyB4rj91VRWn96DkukG4bwdtyTh'); }
  </script>
