<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIZALOK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <!-- Firebase Compat SDK v10.14.1 -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <div class="w-64 bg-zinc-900/95 border-r border-zinc-800 flex flex-col">
      <div class="p-6 flex items-center gap-3">
        <img src="logo.png" alt="VIZALOK Logo" class="w-12 h-12 opacity-70 object-contain">
        <div>
          <span class="text-3xl font-bold tracking-tighter">VIZALOK</span>
          <span class="block text-xs bg-blue-500/20 text-blue-400 px-3 py-0.5 rounded-full mt-1 w-fit">XRP+</span>
        </div>
      </div>
      <nav class="flex-1 px-3 space-y-1 text-sm">
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl bg-zinc-800 hover:bg-zinc-700 transition">
          <i class="fa-solid fa-house w-5"></i> Home/Discover
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 transition">
          <i class="fa-solid fa-cloud-arrow-up w-5"></i> Upload Song
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 transition">
          <i class="fa-solid fa-list w-5"></i> My Catalog
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 transition">
          <i class="fa-solid fa-broadcast-tower w-5"></i> Live Streams
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800 transition">
          <i class="fa-solid fa-coins w-5"></i> Royalties
        </a>
      </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col">
      <!-- TOP BAR -->
      <div class="h-14 bg-zinc-900 border-b border-zinc-800 flex items-center px-8 justify-between">
        <input
          type="text"
          placeholder="Search songs, artists..."
          class="bg-zinc-800 rounded-3xl px-6 py-2 w-96 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <div class="flex items-center gap-6">
          <div id="profile" class="hidden items-center gap-3 cursor-pointer">
            <img src="https://picsum.photos/id/64/32/32" alt="Profile" class="w-8 h-8 rounded-2xl">
            <span id="username" class="font-medium">Username</span>
          </div>
          <button
            onclick="signIn()"
            id="signInBtn"
            class="bg-gradient-to-r from-blue-500 to-purple-500 px-8 py-2 rounded-3xl text-sm font-medium hover:opacity-90 transition"
          >
            Sign In
          </button>
        </div>
      </div>

      <!-- MAIN GRID CONTENT -->
      <div class="flex-1 overflow-auto p-8 grid grid-cols-12 gap-8">
        <!-- Featured Music -->
        <div class="col-span-8 bg-zinc-900 rounded-3xl p-8">
          <div class="text-xs text-zinc-400 mb-3">Featured Music</div>
          <div class="flex gap-8">
            <img src="https://picsum.photos/id/1015/320/320" alt="Artwork" class="w-64 h-64 rounded-2xl object-cover">
            <div class="flex-1">
              <div class="text-4xl font-semibold">300 / myss</div>
              <div class="text-zinc-400 mt-1">VIZALOK</div>
              <div class="mt-12 h-1 bg-zinc-700 rounded-full overflow-hidden">
                <div class="h-full w-1/3 bg-blue-500 rounded-full"></div>
              </div>
              <button class="mt-8 text-5xl text-blue-400 hover:text-blue-300 transition">
                <i class="fa-solid fa-circle-play"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Leaderboard -->
        <div class="col-span-8 bg-zinc-900 rounded-3xl p-8">
          <div class="font-semibold text-lg mb-4">Leaderboard</div>
          <div class="grid grid-cols-2 gap-6 text-sm text-zinc-300">
            Top Artists • Most Popular • Most Sales
          </div>
        </div>

        <!-- Right Sidebar -->
        <div class="col-span-4 space-y-6">
          <div class="bg-zinc-900 rounded-3xl p-6">
            <div class="font-semibold mb-2">Live Streams</div>
            <p class="text-sm text-zinc-400">No live streams right now...</p>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-6">
            <div class="font-semibold mb-2">Trending Creators</div>
            <p class="text-sm text-zinc-400">Trending soon...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Corrected Firebase config (matches your project vizalok-7259)
    const firebaseConfig = {
      apiKey: "AIzaSyCXtvOzhTqYQPjoOfMP4a7rdmv1t2GN-sg",
      authDomain: "vizalok-7259.firebaseapp.com",
      projectId: "vizalok-7259",
      storageBucket: "vizalok-7259.firebasestorage.app",
      messagingSenderId: "589574371802",
      appId: "1:589574371802:web:cda08e23b7d3e63efce8e3",
      measurementId: "G-VGN5GCK7DC"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    console.log('Firebase initialized successfully! Open browser console (F12) to see this.');

    // Real Google sign-in function
    async function signIn() {
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await auth.signInWithPopup(provider);
        console.log('Signed in as:', result.user.displayName || result.user.email);
      } catch (error) {
        console.error('Sign-in error:', error.code, error.message);
        if (error.code === 'auth/unauthorized-domain') {
          alert('Domain error: Add "vizalok.com" to Authorized domains in Firebase console → Authentication → Settings.');
        } else if (error.code === 'auth/popup-blocked') {
          alert('Popup blocked by browser. Allow popups for vizalok.com and try again.');
        } else {
          alert('Sign-in failed: ' + error.message);
        }
      }
    }

    // Listen for auth state → show profile or sign-in button
    auth.onAuthStateChanged((user) => {
      const signInBtn = document.getElementById('signInBtn');
      const profileDiv = document.getElementById('profile');
      const usernameSpan = document.getElementById('username');

      if (user) {
        signInBtn.classList.add('hidden');
        profileDiv.classList.remove('hidden');
        usernameSpan.textContent = user.displayName || user.email?.split('@')[0] || 'User';
      } else {
        signInBtn.classList.remove('hidden');
        profileDiv.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
