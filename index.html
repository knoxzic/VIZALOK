<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIZALOK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap'); body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <div class="w-64 bg-zinc-900/95 border-r border-zinc-800 flex flex-col">
      <div class="p-6 flex items-center gap-3">
        <img src="logo.png" class="w-12 h-12 opacity-70 object-contain"> <!-- upload your monster logo as logo.png -->
        <div>
          <span class="text-3xl font-bold tracking-tighter">VIZALOK</span>
          <span class="block text-xs bg-blue-500/20 text-blue-400 px-3 py-0.5 rounded-full mt-1">XRP+</span>
        </div>
      </div>
      <nav class="flex-1 px-3 space-y-1 text-sm">
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl bg-zinc-800"><i class="fa-solid fa-house w-5"></i> Home/Discover</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800"><i class="fa-solid fa-cloud-arrow-up w-5"></i> Upload Song</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800"><i class="fa-solid fa-list w-5"></i> My Catalog</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800"><i class="fa-solid fa-broadcast-tower w-5"></i> Live Streams</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-3xl hover:bg-zinc-800"><i class="fa-solid fa-coins w-5"></i> Royalties</a>
      </nav>
    </div>

    <!-- MAIN -->
    <div class="flex-1 flex flex-col">
      <div class="h-14 bg-zinc-900 border-b border-zinc-800 flex items-center px-8 justify-between">
        <input type="text" placeholder="Search songs, artists..." class="bg-zinc-800 rounded-3xl px-6 py-2 w-96 text-sm">
        <div class="flex items-center gap-6">
          <div id="profile" class="hidden items-center gap-3 cursor-pointer">
            <img src="https://picsum.photos/id/64/32/32" class="w-8 h-8 rounded-2xl">
            <span id="username" class="font-medium">Username</span>
          </div>
          <button onclick="signIn()" id="signInBtn" class="bg-gradient-to-r from-blue-500 to-purple-500 px-8 py-2 rounded-3xl text-sm font-medium">Sign In</button>
        </div>
      </div>

      <!-- Content (featured + leaderboard + right sidebar) - exact match to visual -->
      <div class="flex-1 overflow-auto p-8 grid grid-cols-12 gap-8">
        <!-- Featured Player (col-span-8) -->
        <div class="col-span-8 bg-zinc-900 rounded-3xl p-8">
          <div class="text-xs text-zinc-400 mb-2">Featured Music</div>
          <div class="flex gap-8">
            <img src="https://picsum.photos/id/1015/320/320" class="w-64 h-64 rounded-2xl">
            <div class="flex-1">
              <div class="text-4xl font-semibold">300 / myss</div>
              <div class="text-zinc-400">VIZALOK</div>
              <div class="mt-12 h-1 bg-zinc-700 rounded-full"><div class="h-1 w-1/3 bg-blue-500 rounded-full"></div></div>
              <button class="mt-8 text-5xl"><i class="fa-solid fa-circle-play"></i></button>
            </div>
          </div>
        </div>

        <!-- Leaderboard & Top Tracks -->
        <div class="col-span-8 mt-6 bg-zinc-900 rounded-3xl p-8">
          <div class="font-semibold mb-4">Leaderboard</div>
          <!-- cards & table here - shortened for space -->
          <div class="grid grid-cols-2 gap-6 text-sm">Top Artists • Most Popular • Most Sales</div>
        </div>

        <!-- Right Sidebar Live + Trending -->
        <div class="col-span-4 space-y-6">
          <div class="bg-zinc-900 rounded-3xl p-6">Live Streams</div>
          <div class="bg-zinc-900 rounded-3xl p-6">Trending Creators</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function signIn(){
      document.getElementById('signInBtn').classList.add('hidden');
      document.getElementById('profile').classList.remove('hidden');
    }
  </script>
</body>
</html>
