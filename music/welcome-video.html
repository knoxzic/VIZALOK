<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Vizalok Music</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #0a0a0f;
      color: white;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    video {
      max-width: 100%;
      max-height: 100%;
    }
    .skip-btn {
      position: absolute;
      top: 30px;
      right: 30px;
      padding: 12px 28px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: 1px solid #00f5ff;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      z-index: 100;
    }
    .skip-btn:hover {
      background: #00f5ff;
      color: black;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video id="welcomeVideo" controls autoplay style="width: 100%; height: 100%; object-fit: contain;">
      <source src="https://drive.google.com/uc?export=download&id=1rFdyf7GVl3WvdTwDzMux6ZzMp9LGcu7l" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <button class="skip-btn" onclick="skipVideo()">Skip Video →</button>
  </div>

  <script>
    const video = document.getElementById('welcomeVideo');

    video.onended = function() {
      window.location.href = 'dashboard.html';
    };

    function skipVideo() {
      window.location.href = 'dashboard.html';
    }

    // Auto redirect after 2 minutes just in case
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 120000);
  </script>
</body>
</html>
