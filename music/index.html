<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizalok Music</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="../logo.png" alt="Vizalok" width="120">
    </div>
    
    <h1><span class="neon">Vizalok Music</span></h1>
    <p class="tagline">Stream • Support • Own • Earn with XRP</p>

    <div class="login-card">
      <h2>Sign in to access your Library</h2>
      
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn-primary">Login</button>
      </form>

      <p class="switch">Don't have an account? 
        <a href="#" onclick="showSignup()">Sign Up</a>
      </p>
    </div>

    <p class="back"><a href="../index.html">← Back to Vizalok Home</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
