<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizalok Music</title>
  <link rel="stylesheet" href="style.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="../logo.png" alt="Vizalok" width="140">
    </div>
    
    <h1><span class="neon">Vizalok Music</span></h1>
    <p class="tagline">Stream • Support • Own • Earn with XRP</p>

    <div class="login-card">
      <h2 id="formTitle">Sign in to access your Library</h2>
      
      <form id="authForm">
        <div class="input-group">
          <input type="email" id="email" placeholder="Email address" required>
        </div>
        <div class="input-group" id="usernameGroup" style="display: none;">
          <input type="text" id="username" placeholder="Username (display name)" required>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Password (min 6 characters)" required>
        </div>
        <button type="submit" id="authButton" class="btn-primary">Login</button>
      </form>

      <p class="switch">
        Don't have an account? 
        <a href="#" id="switchMode">Sign Up</a>
      </p>
    </div>

    <p class="back"><a href="../index.html">← Back to Vizalok Home</a></p>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBAnf2FK2tKySefk1m0WP5DdnQo9iBqAeM",
      authDomain: "vizalok-music.firebaseapp.com",
      projectId: "vizalok-music",
      storageBucket: "vizalok-music.firebasestorage.app",
      messagingSenderId: "431775929269",
      appId: "1:431775929269:web:3da6230e3c4ab88b43bffc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let isLoginMode = true;

    const formTitle = document.getElementById('formTitle');
    const authButton = document.getElementById('authButton');
    const switchModeLink = document.getElementById('switchMode');
    const usernameGroup = document.getElementById('usernameGroup');
    const authForm = document.getElementById('authForm');

    switchModeLink.addEventListener('click', (e) => {
      e.preventDefault();
      isLoginMode = !isLoginMode;

      if (isLoginMode) {
        authButton.textContent = "Login";
        formTitle.textContent = "Sign in to access your Library";
        usernameGroup.style.display = "none";
        switchModeLink.textContent = "Sign Up";
      } else {
        authButton.textContent = "Create Account";
        formTitle.textContent = "Create your Vizalok Music Account";
        usernameGroup.style.display = "block";
        switchModeLink.textContent = "Login";
      }
    });

    authForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || password.length < 6) {
        alert("Please enter email and password (min 6 characters)");
        return;
      }

      console.log("Attempting login with:", email);   // For debugging

      if (isLoginMode) {
        // LOGIN
        auth.signInWithEmailAndPassword(email, password)
          .then((userCredential) => {
            console.log("Login successful!", userCredential.user);
            alert("✅ Login successful! Redirecting to dashboard...");
            window.location.href = 'dashboard.html';
          })
          .catch((error) => {
            console.error("Login error:", error);
            alert("❌ Login failed: " + error.message);
          });
      } else {
        // SIGN UP (simplified for now)
        const username = document.getElementById('username').value.trim();
        if (!username) {
          alert("Please choose a username");
          return;
        }

        auth.createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            return userCredential.user.updateProfile({ displayName: username });
          })
          .then(() => {
            alert(`✅ Account created! Welcome, ${username}`);
            window.location.href = 'dashboard.html';
          })
          .catch((error) => {
            alert("❌ " + error.message);
          });
      }
    });
  </script>
</body>
</html>
