<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizalok Music</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase SDK (compat version - most reliable for static HTML) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="../logo.png" alt="Vizalok" width="140">
    </div>
    
    <h1><span class="neon">Vizalok Music</span></h1>
    <p class="tagline">Stream • Support • Own • Earn with XRP</p>

    <div class="login-card">
      <h2 id="formTitle">Sign in to access your Library</h2>
      
      <form id="authForm">
        <div class="input-group">
          <input type="email" id="email" placeholder="Email address" autocomplete="email" required>
        </div>
        <div class="input-group" id="usernameGroup" style="display: none;">
          <input type="text" id="username" placeholder="Username (display name)" autocomplete="username" required>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Password (min 6 characters)" autocomplete="current-password" required>
        </div>
        
        <button type="submit" id="authButton" class="btn-primary">Login</button>
      </form>

      <p class="switch">
        Don't have an account? 
        <a href="#" id="switchMode">Sign Up</a>
      </p>

      <!-- Error message area -->
      <p id="errorMessage" style="color:#ff5555; text-align:center; margin-top:12px; min-height:20px;"></p>
    </div>

    <p class="back"><a href="../index.html">← Back to Vizalok Home</a></p>
  </div>

  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBAnf2FK2tKySefk1m0WP5DdnQo9iBqAeM",
      authDomain: "vizalok-music.firebaseapp.com",
      projectId: "vizalok-music",
      storageBucket: "vizalok-music.firebasestorage.app",
      messagingSenderId: "431775929269",
      appId: "1:431775929269:web:3da6230e3c4ab88b43bffc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    let isLoginMode = true;

    const formTitle = document.getElementById('formTitle');
    const authButton = document.getElementById('authButton');
    const switchModeLink = document.getElementById('switchMode');
    const usernameGroup = document.getElementById('usernameGroup');
    const authForm = document.getElementById('authForm');
    const errorMessage = document.getElementById('errorMessage');

    // Toggle Login / Sign Up
    switchModeLink.addEventListener('click', (e) => {
      e.preventDefault();
      isLoginMode = !isLoginMode;

      if (isLoginMode) {
        authButton.textContent = "Login";
        formTitle.textContent = "Sign in to access your Library";
        usernameGroup.style.display = "none";
        switchModeLink.textContent = "Sign Up";
      } else {
        authButton.textContent = "Create Account";
        formTitle.textContent = "Create your Vizalok Music Account";
        usernameGroup.style.display = "block";
        switchModeLink.textContent = "Login";
      }
      errorMessage.textContent = '';
    });

    // Form Submit
    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.textContent = '';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const username = document.getElementById('username').value.trim();

      if (!email) {
        errorMessage.textContent = "Please enter your email address";
        return;
      }
      if (password.length < 6) {
        errorMessage.textContent = "Password must be at least 6 characters";
        return;
      }
      if (!isLoginMode && !username) {
        errorMessage.textContent = "Please choose a username";
        return;
      }

      authButton.disabled = true;
      authButton.textContent = isLoginMode ? "Logging in..." : "Creating account...";

      try {
        if (isLoginMode) {
          // LOGIN
          await auth.signInWithEmailAndPassword(email, password);
          alert("✅ Login successful!");
          window.location.href = 'dashboard.html';
        } else {
          // SIGN UP
          const userCredential = await auth.createUserWithEmailAndPassword(email, password);
          
          if (username) {
            await userCredential.user.updateProfile({ displayName: username });
          }

          alert(`✅ Account created successfully!\n\nWelcome, ${username || 'User'}!`);
          
          // Reset to login mode
          isLoginMode = true;
          authButton.textContent = "Login";
          formTitle.textContent = "Sign in to access your Library";
          usernameGroup.style.display = "none";
          switchModeLink.textContent = "Sign Up";
        }
      } catch (error) {
        console.error(error);
        let msg = error.message;
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          msg = "Incorrect email or password.";
        } else if (error.code === 'auth/email-already-in-use') {
          msg = "This email is already registered.";
        } else if (error.code === 'auth/invalid-email') {
          msg = "Invalid email address.";
        }
        errorMessage.textContent = msg;
      } finally {
        authButton.disabled = false;
        authButton.textContent = isLoginMode ? "Login" : "Create Account";
      }
    });
  </script>
</body>
</html>
