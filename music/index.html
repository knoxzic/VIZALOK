<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizalok Music</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    .container {
      text-align: center;
      max-width: 420px;
      width: 100%;
      padding: 40px 20px;
      animation: fadeIn 1s ease-out forwards;
    }

    .logo {
      animation: floatLogo 6s ease-in-out infinite, fadeIn 1.2s ease-out forwards;
    }

    h1 {
      font-size: 2.8rem;
      margin: 20px 0 8px;
      animation: fadeInUp 0.8s ease-out 0.3s forwards;
      opacity: 0;
    }

    .tagline {
      animation: fadeInUp 0.8s ease-out 0.6s forwards;
      opacity: 0;
    }

    .login-card {
      animation: fadeInUp 1s ease-out 0.9s forwards;
      opacity: 0;
    }

    .input-group {
      position: relative;
      margin: 16px 0;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(20, 20, 40, 0.8);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #00f5ff;
      box-shadow: 0 0 0 4px rgba(0, 245, 255, 0.15);
      transform: translateY(-2px);
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #00f5ff, #8b5cf6);
      color: black;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.4s ease;
      margin-top: 10px;
    }

    .btn-primary:hover {
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="../logo.png" alt="Vizalok" width="140">
    </div>
    
    <h1><span class="neon">Vizalok Music</span></h1>
    <p class="tagline">Stream • Support • Own • Earn with XRP</p>

    <div class="login-card">
      <h2>Sign in to access your Library</h2>
      
      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="email" placeholder="Email address" required>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-primary">Login</button>
      </form>

      <p class="switch">Don't have an account? 
        <a href="#" onclick="showSignup()">Sign Up</a>
      </p>
    </div>

    <p class="back"><a href="../index.html">← Back to Vizalok Home</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
