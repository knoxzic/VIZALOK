  <script>
    // ====================== FIREBASE SETUP ======================
    const firebaseConfig = {
      apiKey: "AIzaSyBAnf2FK2tKySefk1m0WP5DdnQo9iBqAeM",
      authDomain: "vizalok-music.firebaseapp.com",
      projectId: "vizalok-music",
      storageBucket: "vizalok-music.firebasestorage.app",
      messagingSenderId: "431775929269",
      appId: "1:431775929269:web:3da6230e3c4ab88b43b"   // fixed + completed
    };

    // Initialize Firebase (Compat version)
    firebase.initializeApp(firebaseConfig);

    // ====================== LOGOUT ======================
    function logout() {
      firebase.auth().signOut().then(() => {
        window.location.href = "index.html";   // Change if your login page has a different name/path
      }).catch((error) => {
        console.error("Logout error:", error);
        alert("Failed to sign out. Please try again.");
      });
    }

    // ====================== SHOW USER NAME ======================
    function loadUserInfo() {
      const user = firebase.auth().currentUser;
      if (user) {
        const displayNameEl = document.getElementById("displayName");
        displayNameEl.textContent = user.displayName || user.email?.split('@')[0] || "User";
      } else {
        // Not logged in → redirect to login
        window.location.href = "index.html";
      }
    }

    // ====================== MUSIC PLAYER ======================
    const globalAudio = document.getElementById("globalAudio");
    let currentPlayingCard = null;

    function playBeat(card, filePath, title) {
      // Stop any currently playing track
      if (currentPlayingCard && currentPlayingCard !== card) {
        currentPlayingCard.classList.remove("ring-2", "ring-cyan-400");
      }

      globalAudio.src = filePath;
      globalAudio.play().catch(err => {
        console.error("Playback failed:", err);
        alert("Could not play this track. Check file path or format.");
      });

      currentPlayingCard = card;
      card.classList.add("ring-2", "ring-cyan-400");
    }

    function pauseAll() {
      globalAudio.pause();
      if (currentPlayingCard) {
        currentPlayingCard.classList.remove("ring-2", "ring-cyan-400");
        currentPlayingCard = null;
      }
    }

    // ====================== LOAD BEATS ======================
    // Add your actual MP4 filenames here (exact names + casing!)
    // Example: if your files are in music/beats/song.mp4 → use "music/beats/song.mp4"
    const beats = [
      {
        title: "Beat 1",
        file: "music/your-first-beat.mp4"   // ← CHANGE THESE TO YOUR REAL FILES
      },
      {
        title: "Beat 2",
        file: "music/your-second-beat.mp4"
      },
      // Add more objects here for each MP4 file
      // {
      //   title: "My Cool Beat",
      //   file: "music/beats/cool-beat.mp4"
      // }
    ];

    function loadBeats() {
      const grid = document.getElementById("beatsGrid");
      grid.innerHTML = "";

      if (beats.length === 0) {
        grid.innerHTML = `<p class="text-zinc-400 col-span-full">No beats added yet. Add them in the script.</p>`;
        return;
      }

      beats.forEach(beat => {
        const cardHTML = `
          <div onclick="playBeat(this, '${beat.file}', '${beat.title}')" 
               class="bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer hover:scale-105 transition-all group">
            <div class="h-48 bg-zinc-800 flex items-center justify-center relative">
              <i class="fa-solid fa-music text-6xl text-cyan-500/30 group-hover:text-cyan-400 transition-colors"></i>
              <div class="absolute bottom-3 right-3 bg-black/70 text-xs px-2 py-1 rounded-full flex items-center gap-1">
                <i class="fa-solid fa-play"></i> Play
              </div>
            </div>
            <div class="p-5">
              <h4 class="font-semibold text-lg">${beat.title}</h4>
              <p class="text-zinc-400 text-sm mt-1">Vizalok Original</p>
            </div>
          </div>
        `;
        grid.innerHTML += cardHTML;
      });
    }

    // ====================== INIT ======================
    window.onload = function() {
      loadUserInfo();
      loadBeats();

      // Optional: Pause when audio ends
      globalAudio.addEventListener("ended", () => {
        if (currentPlayingCard) {
          currentPlayingCard.classList.remove("ring-2", "ring-cyan-400");
          currentPlayingCard = null;
        }
      });
    };
  </script>
