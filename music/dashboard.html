<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library - Vizalok Music</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
    .track-card { background: rgba(30,30,60,0.9); border-radius: 12px; padding: 15px; border: 1px solid #00f5ff33; }
    .track-card img { width: 100%; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container" style="max-width:1100px; padding:40px 20px;">
    <h1>My Library</h1>
    <p>Welcome back! Here are the artists and tracks you've invested in.</p>

    <div class="library-grid">
      <div class="track-card">
        <img src="https://via.placeholder.com/300x300/1a0033/00f5ff?text=Midnight+Drive" alt="Track">
        <h3>Midnight Drive</h3>
        <p>Alex Rivera</p>
        <p><strong>Your Investment:</strong> $45.00 (0.18% ownership)</p>
        <p><strong>Current Value:</strong> <span style="color:#22ff88">$82.50 (+83%)</span></p>
        <p><strong>Royalties Earned:</strong> $12.40 XRP</p>
        <button class="btn-primary" style="margin-top:10px; font-size:0.9rem;">Play Now</button>
      </div>
    </div>

    <button onclick="logout()" style="margin-top:40px;">Logout</button>
  </div>

  <script>
    if (!localStorage.getItem('vizalokLoggedIn')) {
      window.location.href = 'index.html';
    }
    function logout() {
      localStorage.removeItem('vizalokLoggedIn');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
