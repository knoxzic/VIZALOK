<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library - Vizalok Music</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase SDK - Compat version (same as login) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

  <style>
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(0, 245, 255, 0.2);
    }
    .welcome {
      font-size: 2.2rem;
      color: #00f5ff;
    }
    .main-card {
      background: rgba(30, 30, 60, 0.9);
      border-radius: 20px;
      padding: 60px 40px;
      border: 1px solid rgba(0, 245, 255, 0.25);
    }
    .logout-btn {
      padding: 14px 32px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 class="welcome" id="welcome-text">Welcome</h1>
        <p id="user-email" style="color:#aaa; margin-top:8px;"></p>
      </div>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <div class="main-card">
      <h2>Your Music Library</h2>
      <p style="color:#ccc; margin: 30px 0; line-height:1.6;">
        Welcome to your personal dashboard.<br>
        Your invested tracks, royalties, and portfolio will appear here soon.
      </p>
    </div>
  </div>

  <script>
    // Initialize Firebase - Same as login page
    const firebaseConfig = {
      apiKey: "AIzaSyBAnf2FK2tKySefk1m0WP5DdnQo9iBqAeM",
      authDomain: "vizalok-music.firebaseapp.com",
      projectId: "vizalok-music",
      storageBucket: "vizalok-music.firebasestorage.app",
      messagingSenderId: "431775929269",
      appId: "1:431775929269:web:3da6230e3c4ab88b43bffc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Check auth state
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        const displayName = user.displayName || "User";
        document.getElementById('welcome-text').textContent = `Welcome, ${displayName}!`;
        document.getElementById('user-email').textContent = user.email;
      }
    });

    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        auth.signOut().then(() => {
          window.location.href = 'index.html';
        });
      }
    }
  </script>
</body>
</html>
