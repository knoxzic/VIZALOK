<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizalok Music • Library</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    
    <!-- Top Navbar -->
    <div class="flex justify-between items-center mb-10 border-b border-cyan-500/20 pb-6">
      <div class="flex items-center gap-4">
        <img src="../logo.png" alt="Vizalok" width="50">
        <h1 class="text-4xl font-black tracking-[-2px] neon">VIZALOK MUSIC</h1>
      </div>
      <div class="flex items-center gap-6">
        <div id="xrp-value" class="text-sm font-medium flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-2xl border border-cyan-400/30">
          <span class="text-cyan-400">XRP</span>
          <span id="xrp-price" class="text-emerald-400 font-mono">$ --</span>
          <span id="xrp-change" class="text-xs"></span>
        </div>
        <button onclick="logout()" 
                class="px-6 py-3 bg-zinc-800 hover:bg-red-600/20 text-red-400 rounded-2xl flex items-center gap-2 transition">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>

    <!-- Welcome -->
    <div class="mb-12">
      <h2 class="text-3xl font-bold mb-4">Welcome back, <span id="displayName" class="text-cyan-400"></span> 👋</h2>
      <p class="text-zinc-400 mb-6">Your Library • Content stored securely on Storj</p>
      
      <!-- Featured Video Player -->
      <div class="bg-black rounded-3xl overflow-hidden border border-cyan-400/30 shadow-2xl relative">
        <video id="featuredVideo" 
               controls 
               class="w-full aspect-video"
               poster="../poster.jpg">
          <source id="videoSource" 
                  src="https://link.storjshare.io/raw/juqu4s5lmfg4/juqu4s5lmfg4" 
                  type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </div>
      
      <div class="mt-4 flex justify-between items-center text-sm">
        <p class="text-zinc-400">Featured: Welcome to the Vizalok Music Universe</p>
        <button onclick="document.getElementById('featuredVideo').play()" 
                class="text-cyan-400 hover:text-white flex items-center gap-2 font-medium">
          <i class="fa-solid fa-play"></i> Play Now
        </button>
      </div>
    </div>

    <!-- Library Section -->
    <div>
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3">
        <i class="fa-solid fa-music"></i> Your Library
      </h3>
      <div id="libraryGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
        <!-- Placeholder for now - we'll expand this soon -->
        <div class="col-span-full text-center py-16 text-zinc-500 border border-dashed border-zinc-700 rounded-3xl">
          Your purchased & redeemed music and videos will appear here<br>
          <span class="text-xs block mt-3 opacity-75">Powered by Storj decentralized storage</span>
        </div>
      </div>
    </div>
  </div>

    // Firebase Auth (keeps your login working)
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('displayName').textContent = user.displayName
