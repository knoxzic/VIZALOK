<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizalok | Music</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { margin:0; background:#0a0a0f; color:white; font-family:'Inter', sans-serif; }
    .dashboard {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 240px;
      background: #111827;
      padding: 20px 0;
      border-right: 1px solid #1f2937;
    }
    .main-content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      background: #1f2937;
      border-radius: 16px;
      aspect-ratio: 1 / 1;
      transition: transform 0.3s;
    }
    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <div class="sidebar">
      <div style="padding: 0 20px 20px;">
        <img src="../logo.png" alt="Vizalok" width="60">
      </div>
      <div style="padding: 10px 20px; background:#1f2937; margin:10px 20px; border-radius:12px;">Home</div>
      <div style="padding: 10px 20px; margin:10px 20px; border-radius:12px;">Store</div>
      <div style="padding: 10px 20px; margin:10px 20px; border-radius:12px;">Profile</div>
      <div style="padding: 10px 20px; margin:10px 20px; border-radius:12px;">Settings</div>
      <div style="padding: 10px 20px; margin:10px 20px; border-radius:12px;">Help</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="top-bar">
        <h1 style="margin:0;">What's Trending</h1>
        <div style="display:flex; gap:15px; align-items:center;">
          <input type="text" placeholder="Search" style="padding:10px 16px; width:300px; background:#1f2937; border:none; border-radius:999px; color:white;">
          <div>🛎️</div>
          <div style="width:40px; height:40px; background:#4f46e5; border-radius:50%;"></div>
        </div>
      </div>

      <div class="grid">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
      </div>
    </div>
  </div>

  <script>
    // Simple auth check (you can expand later)
    // For now we assume they came from login
  </script>
</body>
</html>
