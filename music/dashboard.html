<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library - Vizalok Music</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="container" style="max-width:1100px; padding:40px 20px; text-align:center;">
    
    <h1 style="color:#00f5ff; margin-bottom:10px;">My Library</h1>
    
    <div id="welcome-box" style="margin:30px 0; padding:30px; background:rgba(30,30,60,0.9); border-radius:16px; border:1px solid #00f5ff33;">
      <h2 id="welcome-text">Welcome</h2>
      <p id="user-email" style="color:#aaa; margin-top:10px;"></p>
    </div>

    <div style="background:rgba(20,20,40,0.8); padding:40px; border-radius:16px; margin:40px 0;">
      <p style="color:#ccc; font-size:1.1rem;">
        Your personal music library is loading...<br><br>
        Tracks you've invested in will appear here soon.
      </p>
    </div>

    <button onclick="logout()" style="padding:14px 32px; background:#ff4444; color:white; border:none; border-radius:12px; font-size:1.1rem; cursor:pointer;">
      Logout
    </button>
  </div>

  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBAnf2FK2tKySefk1m0WP5DdnQo9iBqAeM",
      authDomain: "vizalok-music.firebaseapp.com",
      projectId: "vizalok-music",
      storageBucket: "vizalok-music.firebasestorage.app",
      messagingSenderId: "431775929269",
      appId: "1:431775929269:web:3da6230e3c4ab88b43bffc"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Check if user is logged in
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = 'index.html';
      } else {
        const displayName = user.displayName || "User";
        document.getElementById('welcome-text').textContent = `Welcome, ${displayName}!`;
        document.getElementById('user-email').textContent = user.email;
      }
    });

    function logout() {
      if (confirm("Are you sure you want to logout?")) {
        auth.signOut().then(() => {
          window.location.href = 'index.html';
        });
      }
    }
  </script>
</body>
</html>
