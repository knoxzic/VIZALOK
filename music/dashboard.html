<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vizalok Music • Library</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col">
      <div class="flex items-center gap-3 mb-12">
        <img src="../logo.png" alt="Vizalok" width="60">
        <h1 class="text-3xl font-black tracking-tight">VIZALOK</h1>
      </div>

      <div class="space-y-2 flex-1">
        <div class="nav-item active flex items-center gap-3 px-5 py-4 rounded-2xl bg-cyan-500/10 text-cyan-400">
          <i class="fa-solid fa-house"></i>
          <span>Home</span>
        </div>
        <div class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-zinc-800 cursor-pointer">
          <i class="fa-solid fa-store"></i>
          <span>Store</span>
        </div>
        <div class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-zinc-800 cursor-pointer">
          <i class="fa-solid fa-user"></i>
          <span>Profile</span>
        </div>
        <div class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-zinc-800 cursor-pointer">
          <i class="fa-solid fa-gear"></i>
          <span>Settings</span>
        </div>
        <div class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-zinc-800 cursor-pointer">
          <i class="fa-solid fa-circle-question"></i>
          <span>Help</span>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-10 overflow-y-auto">
      <!-- Top Bar -->
      <div class="flex justify-between items-center mb-12">
        <h1 class="text-4xl font-bold">Vizalok Music</h1>
        
        <div class="flex items-center gap-6">
          <input type="text" placeholder="Search songs, artists..." 
                 class="bg-zinc-900 border border-zinc-700 focus:border-cyan-400 rounded-full px-6 py-3 w-96 outline-none">
          <div class="text-2xl cursor-pointer">🛎️</div>
          <div class="w-10 h-10 bg-violet-600 rounded-full flex items-center justify-center font-bold cursor-pointer">B</div>
        </div>
      </div>

      <!-- Welcome -->
      <div class="mb-12">
        <h2 class="text-4xl font-bold mb-2">Welcome back, <span id="displayName" class="text-cyan-400"></span> 👋</h2>
        <p class="text-zinc-400">Here's what's trending in your library</p>
      </div>
